name: Deploy Learnify

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  # ============================================
  # JOB 1: Deploy Frontend to Vercel
  # ============================================
  deploy-frontend:
    name: Deploy Frontend to Vercel
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      
      - name: Install dependencies
        run: |
          cd client
          npm install --legacy-peer-deps
      
      - name: Build project
        run: |
          cd client
          npm run build
        env:
          NEXT_PUBLIC_SERVER_URI: ${{ secrets.NEXT_PUBLIC_SERVER_URI }}
          NEXT_PUBLIC_SOCKET_SERVER_URI: ${{ secrets.NEXT_PUBLIC_SOCKET_SERVER_URI }}
      
      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v20
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
          working-directory: ./client

  # ============================================
  # JOB 2: Deploy Backend to EC2
  # ============================================
  deploy-backend:
    name: Deploy Backend to EC2
    runs-on: ubuntu-latest
    needs: deploy-frontend  # Waits for frontend to finish
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: true
          tags: mateebhaider/learnify-server:latest
      
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Pull the latest image
            docker pull mateebhaider/learnify-server:latest
            
            # Stop and remove old container
            docker stop learnify-server || true
            docker rm learnify-server || true
            
            # Run new container
            docker run -d \
              --name learnify-server \
              --restart always \
              --dns 8.8.8.8 \
              -p 8000:8000 \
              --env-file /home/ubuntu/.env \
              mateebhaider/learnify-server:latest
            
            # Clean up old images
            docker image prune -f